<svg width="1600" height="540" viewBox="0 0 1600 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1540" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="0.5" stop-color="#0C1825"/>
      <stop offset="1" stop-color="#101B2B"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="170" y1="0" x2="1330" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E7FF"/>
      <stop offset="0.5" stop-color="#FF7A59"/>
      <stop offset="1" stop-color="#FFC857"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="0" x2="280" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E7FF"/>
      <stop offset="1" stop-color="#7A8CFF"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" y1="0" x2="280" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF7A59"/>
      <stop offset="1" stop-color="#FFC857"/>
    </linearGradient>
    <radialGradient id="orbA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 120) rotate(90) scale(240 240)">
