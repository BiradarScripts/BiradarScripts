  <circle cx="260" cy="120" r="240" fill="url(#orbA)"/>
  <circle cx="1360" cy="420" r="260" fill="url(#orbB)"/>
  <circle cx="240" cy="98" r="92" fill="#00E7FF" fill-opacity="0.14" filter="url(#softBlur)"/>
